services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "echo >/dev/tcp/127.0.0.1/9000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  websocket-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8000"
      YOLO_WS_PORT: "8000"
      YOLO_WS_MINIO_ACCESS_KEY: minioadmin
      YOLO_WS_MINIO_SECRET_KEY: minioadmin
      YOLO_WS_MINIO_BUCKET: invoice-route-evidence
      YOLO_WS_MINIO_PREFIX: invoice-route-app/yolo-websocket-demo
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./runtime:/app/runtime
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  websocket-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      websocket-api:
        condition: service_healthy
    command:
      - python
      - examples/poll_runtime_monitor.py
      - --base-url
      - http://websocket-api:8000
      - --interval-seconds
      - "2"
    networks:
      - default
    healthcheck:
      disable: true

volumes:
  postgres-data:
  minio-data:
